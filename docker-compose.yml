services:
  postgres:
    image: postgres:15-alpine
    container_name: jijasbet-postgres
    restart: always
    environment:
      POSTGRES_USER: jijasbet
      POSTGRES_PASSWORD: jijasbet123
      POSTGRES_DB: jijasbet
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jijasbet -d jijasbet"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
